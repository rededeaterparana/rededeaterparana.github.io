<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>OG Image</title>
  <style>
    :root {
      --verde-1: #245a2e;
      --verde-2: #2e6e3a;
      --verde-3: #5aa66a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px; height: 640px;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .frame {
      width: 1280px; height: 640px;
      background:
        radial-gradient(circle at 88% 110%, rgba(90,166,106,0.30), transparent 55%),
        radial-gradient(circle at 8% -5%, rgba(36,90,46,0.45), transparent 55%),
        linear-gradient(135deg, var(--verde-1) 0%, var(--verde-2) 60%, #357d44 100%);
      color: #fff;
      position: relative;
      padding: 80px 80px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .marca {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }
    .marca::before {
      content: '';
      display: inline-block;
      width: 40px; height: 2px;
      background: var(--verde-3);
    }
    .titulo h1 {
      font-size: 68px;
      line-height: 1.06;
      font-weight: 800;
      letter-spacing: -0.015em;
      text-shadow: 0 2px 14px rgba(0,0,0,0.25);
      max-width: 1040px;
    }
    .titulo p {
      font-size: 24px;
      margin-top: 22px;
      font-weight: 400;
      opacity: 0.92;
      max-width: 940px;
      line-height: 1.4;
    }
    .rodape {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      border-top: 1px solid rgba(255,255,255,0.22);
      padding-top: 18px;
    }
    .rodape .esq { font-weight: 600; opacity: 0.92; }
    .rodape .url {
      background: rgba(0,0,0,0.22);
      padding: 8px 14px;
      border-radius: 4px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topo">
      <div class="marca">Cadastro público</div>
      <div class="titulo" style="margin-top: 28px;">
        <h1>Rede Paranaense de Assistência Técnica e Extensão Rural</h1>
        <p>Adesão das entidades prestadoras de ATER no Paraná e visualização agregada da capacidade instalada.</p>
      </div>
    </div>

    <div class="rodape">
      <div class="esq">rededeaterparana.github.io</div>
      <div class="url">/form/ · /painel/</div>
    </div>
  </div>
</body>
</html>
