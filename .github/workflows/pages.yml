name: Build e publica no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            form/package-lock.json
            painel/package-lock.json

      # ─── form/ ──────────────────────────────────────────────────────
      - name: Instalar dependências (form)
        working-directory: form
        run: npm ci

      - name: Build form
        working-directory: form
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          BASE_URL: /form/
        run: npm run build

      # ─── painel/ ────────────────────────────────────────────────────
      - name: Instalar dependências (painel)
        working-directory: painel
        run: npm ci

      - name: Build painel
        working-directory: painel
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BASE_URL: /painel/
        run: npm run build

      # ─── Monta site estático combinado ─────────────────────────────
      - name: Montar diretório do Pages
        run: |
          mkdir -p site/form site/painel
          cp -r form/dist/* site/form/
          cp -r painel/dist/* site/painel/
          # Reaproveita favicon, logo e og-image para a landing
          cp form/public/favicon.ico site/favicon.ico
          cp form/public/logo-idr.png site/logo-idr.png
          cp .github/og-image.png site/og-image.png
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="theme-color" content="#007524">
            <link rel="icon" href="./favicon.ico">
            <meta property="og:title" content="Rede Estadual de ATER — IDR-Paraná">
            <meta property="og:description" content="Cadastro e visualização das entidades prestadoras de Assistência Técnica e Extensão Rural do Paraná.">
            <meta property="og:image" content="https://rededeaterparana.github.io/og-image.png">
            <meta property="og:url" content="https://rededeaterparana.github.io/">
            <meta property="og:type" content="website">
            <meta property="og:locale" content="pt_BR">
            <meta name="twitter:card" content="summary_large_image">
            <title>Rede Estadual de ATER | IDR-Paraná</title>
            <style>
              :root { font-family: Arial, Helvetica, sans-serif; color: #333; }
              * { box-sizing: border-box; }
              body { margin: 0; background: #f5f5f5; }
              .gov-bar { background: #f0f0f0; border-bottom: 1px solid #ddd; font-size: 11px; color: #666; padding: 6px 16px; }
              .gov-bar strong { color: #068833; margin-right: 8px; }
              header { background: #fff; border-bottom: 4px solid #007524; padding: 18px 16px; display: flex; align-items: center; gap: 16px; max-width: 1100px; margin: 0 auto; }
              header img { height: 56px; }
              header h1 { margin: 0; font-size: 1.1rem; color: #005a1c; }
              header p { margin: 3px 0 0; font-size: 0.85rem; color: #666; }
              main { max-width: 720px; margin: 40px auto; padding: 0 16px; }
              main h2 { color: #005a1c; font-size: 1.3rem; }
              a.card { display: block; margin: 14px 0; padding: 20px; background: #fff; border: 1px solid #ddd; border-left: 4px solid #007524; border-radius: 4px; text-decoration: none; color: #333; box-shadow: 0 1px 2px rgba(0,0,0,0.04); transition: background .15s; }
              a.card:hover { background: #e8f3eb; }
              a.card strong { color: #005a1c; font-size: 1.05rem; display: block; margin-bottom: 4px; }
              a.card span { font-size: 0.88rem; color: #666; }
              footer { background: #007524; color: #fff; padding: 26px 16px; text-align: center; font-size: 0.82rem; margin-top: 40px; }
              footer a { color: #fff; text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="gov-bar"><strong>GOVERNO DO PARANÁ</strong><span>Instituto de Desenvolvimento Rural do Paraná — IDR-Paraná</span></div>
            <header>
              <img src="./logo-idr.png" alt="IDR-Paraná">
              <div>
                <h1>Rede Estadual de Assistência Técnica e Extensão Rural</h1>
                <p>Cadastro e visualização das entidades prestadoras</p>
              </div>
            </header>
            <main>
              <h2>Acesso</h2>
              <a class="card" href="./form/">
                <strong>Formulário de adesão →</strong>
                <span>Para entidades que desejam aderir à Rede Estadual de ATER.</span>
              </a>
              <a class="card" href="./painel/">
                <strong>Painel de visualização →</strong>
                <span>Dados agregados das entidades já cadastradas na rede.</span>
              </a>
            </main>
            <footer>
              IDR-Paraná &middot; <a href="https://www.idrparana.pr.gov.br/">www.idrparana.pr.gov.br</a>
            </footer>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
