name: Build e publica no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            form/package-lock.json
            painel/package-lock.json

      # ─── form/ ──────────────────────────────────────────────────────
      - name: Instalar dependências (form)
        working-directory: form
        run: npm ci

      - name: Build form
        working-directory: form
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          BASE_URL: /form/
        run: npm run build

      # ─── painel/ ────────────────────────────────────────────────────
      - name: Instalar dependências (painel)
        working-directory: painel
        run: npm ci

      - name: Build painel
        working-directory: painel
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BASE_URL: /painel/
        run: npm run build

      # ─── Monta site estático combinado ─────────────────────────────
      - name: Montar diretório do Pages
        run: |
          mkdir -p site/form site/painel
          cp -r form/dist/* site/form/
          cp -r painel/dist/* site/painel/
          cp .github/og-image.png site/og-image.png
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta property="og:title" content="Rede Paranaense de ATER">
            <meta property="og:description" content="Cadastro e visualização das entidades prestadoras de Assistência Técnica e Extensão Rural do Paraná.">
            <meta property="og:image" content="https://rededeaterparana.github.io/og-image.png">
            <meta property="og:url" content="https://rededeaterparana.github.io/">
            <meta property="og:type" content="website">
            <meta property="og:locale" content="pt_BR">
            <meta name="twitter:card" content="summary_large_image">
            <title>Rede Paranaense de ATER</title>
            <style>
              :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #1f2328; }
              * { box-sizing: border-box; }
              body { margin: 0; background: #f6f8fa; }
              main { max-width: 720px; margin: 60px auto; padding: 0 16px; }
              h1 { font-size: 1.5rem; margin: 0 0 4px; }
              p.subtitulo { margin: 0 0 28px; color: #57606a; }
              a.card { display: block; margin: 12px 0; padding: 18px; background: #fff; border: 1px solid #d0d7de; border-radius: 8px; text-decoration: none; color: #1f2328; }
              a.card:hover { background: #f6f8fa; border-color: #2e6e3a; }
              a.card strong { display: block; margin-bottom: 4px; font-size: 1.05rem; color: #2e6e3a; }
              a.card span { font-size: 0.9rem; color: #57606a; }
            </style>
          </head>
          <body>
            <main>
              <h1>Rede Paranaense de Assistência Técnica e Extensão Rural</h1>
              <p class="subtitulo">Cadastro e visualização das entidades prestadoras.</p>
              <a class="card" href="./form/">
                <strong>Formulário de adesão →</strong>
                <span>Para entidades que desejam aderir à rede.</span>
              </a>
              <a class="card" href="./painel/">
                <strong>Painel de visualização →</strong>
                <span>Dados agregados das entidades já cadastradas.</span>
              </a>
            </main>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
