    <!--
      CSP estrita. connect-src precisa permitir o domínio do Apps Script.
      script-src libera reCAPTCHA. Sem inline scripts/styles (Vite extrai tudo).
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/;
      frame-src https://www.google.com/recaptcha/;
      connect-src 'self' https://script.google.com https://script.googleusercontent.com https://viacep.com.br;
      img-src 'self' data:;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

  </head>
